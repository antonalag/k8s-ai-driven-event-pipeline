spring.application.name=k8s-collector
server.port=8081

# ──────────────────────────────────────────────────────────────────────────────
# Kafka Producer — Milestone 5
# ──────────────────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092

# Key serializer: Pod name is a plain String
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer

# Value serializer: Spring's JsonSerializer converts KubernetesEvent record to JSON automatically
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Embed the type header so consumers can deserialize without extra config
spring.kafka.producer.properties.spring.json.add.type.headers=true

# Reliability: wait for all in-sync replicas to acknowledge (safe for local single-broker)
spring.kafka.producer.acks=all

# Retry on transient errors (network blip, leader election)
spring.kafka.producer.retries=3
