spring.application.name=ai-analyzer
server.port=8082

# ──────────────────────────────────────────────────────────────────────────────
# RFC 7807 — Problem Details for HTTP APIs
# ──────────────────────────────────────────────────────────────────────────────
spring.mvc.problemdetails.enabled=true

# ──────────────────────────────────────────────────────────────────────────────
# Platform Adapter Activation (Ports & Adapters / BYOK)
# ──────────────────────────────────────────────────────────────────────────────
platform.ai.provider=ollama
platform.storage.type=opensearch
platform.messaging.type=kafka

# ──────────────────────────────────────────────────────────────────────────────
# Ollama — Intelligence Layer (Phase 3 / Milestone 7)
# ──────────────────────────────────────────────────────────────────────────────
# Local Ollama instance (default port). Override via env var OLLAMA_API_URL.
ollama.api.url=http://localhost:11434
# llama3.1 offers the best instruction-following and JSON-mode compliance
# among locally-runnable models. Override via env var OLLAMA_MODEL.
ollama.model=llama3.1

# ──────────────────────────────────────────────────────────────────────────────
# Kafka Consumer — Milestone 7
# ──────────────────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092

# Consumer group — all instances of ai-analyzer share the same group
# so each event is processed by exactly one instance
spring.kafka.consumer.group-id=ai-analyzer-group

# Start from the beginning if no committed offset exists for this group
spring.kafka.consumer.auto-offset-reset=earliest

# Key deserializer: Pod name key is a plain String
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Value deserializer: Spring's JsonDeserializer reconstructs the KubernetesEvent record
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Trust all packages so the JsonDeserializer can reconstruct types from the type header
# embedded by the producer (spring.json.add.type.headers=true in k8s-collector)
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Explicit target type — avoids class-not-found issues when the type header references
# the collector's package (com.k8s.pipeline.collector.model.KubernetesEvent)
spring.kafka.consumer.properties.spring.json.value.default.type=com.platform.analyzer.domain.model.KubernetesEvent

# ──────────────────────────────────────────────────────────────────────────────
# Kafka Producer — Milestone 8
# ai-analyzer acts as a hybrid Consumer+Producer:
#   consumes  → k8s-pod-events
#   produces  → ai-analysis-events
# ──────────────────────────────────────────────────────────────────────────────

# Key serializer: pod name key is a plain String
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer

# Value serializer: Spring's JsonSerializer converts AiAnalysisEvent records to JSON
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Embed the Java type header so downstream consumers can auto-deserialize
spring.kafka.producer.properties.spring.json.add.type.headers=true

# Reliability: wait for all in-sync replicas to acknowledge before confirming send
spring.kafka.producer.acks=all

# Idempotent producer — prevents duplicate messages on retry
spring.kafka.producer.properties.enable.idempotence=true

# ──────────────────────────────────────────────────────────────────────────────
# OpenSearch — Storage Layer (Phase 4 / Milestone 9)
# Local OpenSearch instance running via Docker Compose (no security for local dev)
# ──────────────────────────────────────────────────────────────────────────────
opensearch.uris=http://localhost:9200
opensearch.username=admin
opensearch.password=admin
# Disable SSL hostname verification for local dev (self-signed cert)
opensearch.ssl.verification-mode=none

# ──────────────────────────────────────────────────────────────────────────────
# Resilience4j — Circuit Breaker (Pipeline Resilience)
# ──────────────────────────────────────────────────────────────────────────────
platform.resilience.circuit-breaker.sliding-window-size=10
platform.resilience.circuit-breaker.failure-rate-threshold=50
platform.resilience.circuit-breaker.wait-duration-in-open-state=30
platform.resilience.circuit-breaker.permitted-calls-in-half-open=3
