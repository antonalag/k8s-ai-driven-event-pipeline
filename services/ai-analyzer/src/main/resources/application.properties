spring.application.name=ai-analyzer
server.port=8082

# ──────────────────────────────────────────────────────────────────────────────
# Kafka Consumer — Milestone 7
# ──────────────────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092

# Consumer group — all instances of ai-analyzer share the same group
# so each event is processed by exactly one instance
spring.kafka.consumer.group-id=ai-analyzer-group

# Start from the beginning if no committed offset exists for this group
spring.kafka.consumer.auto-offset-reset=earliest

# Key deserializer: Pod name key is a plain String
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Value deserializer: Spring's JsonDeserializer reconstructs the KubernetesEvent record
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Trust all packages so the JsonDeserializer can reconstruct types from the type header
# embedded by the producer (spring.json.add.type.headers=true in k8s-collector)
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Explicit target type — avoids class-not-found issues when the type header references
# the collector's package (com.k8s.pipeline.collector.model.KubernetesEvent)
spring.kafka.consumer.properties.spring.json.value.default.type=com.platform.analyzer.model.KubernetesEvent
