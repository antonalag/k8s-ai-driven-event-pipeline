spring.application.name=ai-analyzer
server.port=${SERVER_PORT:8082}

# ──────────────────────────────────────────────────────────────────────────────
# Exclude native Elasticsearch client autoconfig (we use spring-data-opensearch)
# Keep ElasticsearchRepositoriesAutoConfiguration for Spring Data repo scanning.
# ──────────────────────────────────────────────────────────────────────────────
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchClientAutoConfiguration,\
  org.springframework.boot.autoconfigure.elasticsearch.ReactiveElasticsearchClientAutoConfiguration,\
  org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.elasticsearch.ReactiveElasticsearchRepositoriesAutoConfiguration

# ──────────────────────────────────────────────────────────────────────────────
# RFC 7807 — Problem Details for HTTP APIs
# ──────────────────────────────────────────────────────────────────────────────
spring.mvc.problemdetails.enabled=true

# ──────────────────────────────────────────────────────────────────────────────
# Platform Adapter Activation (Ports & Adapters / BYOK)
# ──────────────────────────────────────────────────────────────────────────────
platform.ai.provider=${PLATFORM_AI_PROVIDER:ollama}
platform.storage.type=${PLATFORM_STORAGE_TYPE:opensearch}
platform.messaging.type=${PLATFORM_MESSAGING_TYPE:kafka}

# ──────────────────────────────────────────────────────────────────────────────
# Ollama — Intelligence Layer
# ──────────────────────────────────────────────────────────────────────────────
ollama.api.url=${OLLAMA_API_URL:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:llama3.1}

# ──────────────────────────────────────────────────────────────────────────────
# BYOK — Bring Your Own Key (external AI provider)
# Only active when platform.ai.provider=byok
# ──────────────────────────────────────────────────────────────────────────────
platform.byok.endpoint=${BYOK_ENDPOINT:}
platform.byok.api-key=${BYOK_API_KEY:}
platform.byok.model=${BYOK_MODEL:}
platform.byok.provider-type=${BYOK_PROVIDER_TYPE:OPENAI_COMPATIBLE}

# ──────────────────────────────────────────────────────────────────────────────
# Kafka Consumer/Producer
# ──────────────────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

spring.kafka.consumer.group-id=ai-analyzer-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.platform.analyzer.domain.model.KubernetesEvent

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=true
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true

# ──────────────────────────────────────────────────────────────────────────────
# OpenSearch — Storage Layer
# ──────────────────────────────────────────────────────────────────────────────
opensearch.uris=${OPENSEARCH_URIS:http://localhost:9200}
opensearch.username=${OPENSEARCH_USERNAME:admin}
opensearch.password=${OPENSEARCH_PASSWORD:admin}
opensearch.ssl.verification-mode=none

# ──────────────────────────────────────────────────────────────────────────────
# Resilience4j — AI Provider Circuit Breaker
# ──────────────────────────────────────────────────────────────────────────────
platform.resilience.circuit-breaker.sliding-window-size=${CB_AI_SLIDING_WINDOW:10}
platform.resilience.circuit-breaker.failure-rate-threshold=${CB_AI_FAILURE_RATE:50}
platform.resilience.circuit-breaker.wait-duration-in-open-state=${CB_AI_WAIT_DURATION:30}
platform.resilience.circuit-breaker.permitted-calls-in-half-open=${CB_AI_HALF_OPEN_CALLS:3}

# ──────────────────────────────────────────────────────────────────────────────
# MCP Server — Intelligence Enrichment Layer
# ──────────────────────────────────────────────────────────────────────────────
platform.mcp.server-url=${PLATFORM_MCP_SERVER_URL:http://localhost:3001}
platform.mcp.connection-timeout=${MCP_CONNECTION_TIMEOUT:5}
platform.mcp.read-timeout=${MCP_READ_TIMEOUT:10}
platform.mcp.max-prompt-bytes=${MCP_MAX_PROMPT_BYTES:65536}

# ──────────────────────────────────────────────────────────────────────────────
# MCP Circuit Breaker
# ──────────────────────────────────────────────────────────────────────────────
platform.mcp.circuit-breaker.sliding-window-size=${CB_MCP_SLIDING_WINDOW:10}
platform.mcp.circuit-breaker.failure-rate-threshold=${CB_MCP_FAILURE_RATE:50}
platform.mcp.circuit-breaker.wait-duration-in-open-state=${CB_MCP_WAIT_DURATION:30}
platform.mcp.circuit-breaker.permitted-calls-in-half-open=${CB_MCP_HALF_OPEN_CALLS:3}

# ──────────────────────────────────────────────────────────────────────────────
# Mutation Circuit Breaker — Write-path resilience
# ──────────────────────────────────────────────────────────────────────────────
platform.resilience.mutation.sliding-window-size=${CB_MUTATION_SLIDING_WINDOW:5}
platform.resilience.mutation.failure-rate-threshold=${CB_MUTATION_FAILURE_RATE:50}
platform.resilience.mutation.wait-duration-in-open-state=${CB_MUTATION_WAIT_DURATION:30}
platform.resilience.mutation.permitted-calls-in-half-open=${CB_MUTATION_HALF_OPEN_CALLS:2}
