openapi: 3.0.3
info:
  title: AI Analyzer API
  version: 1.0.0
  description: >
    REST API for querying AI analysis reports from the ai-analyzer service.
    Provides access to AI-driven diagnostics of Kubernetes pod health,
    including verdicts, root cause analysis, and recommended actions.
  contact:
    name: Platform Team
  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /api/v1/analyses:
    get:
      operationId: queryAnalyses
      summary: Query AI analysis reports
      description: >
        Returns AI analysis reports with optional filtering by namespace or podName.
        When both parameters are provided, namespace takes priority and podName is ignored.
        Empty string parameters are treated as absent (equivalent to null).
        Results are ordered by analyzedAt descending.
      parameters:
        - name: namespace
          in: query
          required: false
          description: Filter analyses by Kubernetes namespace
          schema:
            type: string
          example: production
        - name: podName
          in: query
          required: false
          description: Filter analyses by pod name (ignored if namespace is provided)
          schema:
            type: string
          example: nginx-deployment-abc123
      responses:
        '200':
          description: Successful query — returns array of analysis reports (may be empty)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AiAnalysisResponse'
              examples:
                withResults:
                  summary: Response with analysis results
                  value:
                    - podName: nginx-abc
                      namespace: production
                      verdict: CRITICAL_FAILURE
                      rootCauseAnalysis: "Pod terminated due to OOMKilled — memory limit exceeded"
                      recommendedActions:
                        - "Increase memory limits in deployment spec"
                        - "Review application memory usage patterns"
                      analyzedAt: "2024-01-15T10:30:00Z"
                emptyResults:
                  summary: No matching analyses found
                  value: []
        '400':
          description: Validation error — malformed query parameters
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              example:
                type: "urn:problem-type:validation-error"
                title: "Bad Request"
                status: 400
                detail: "Query parameter validation failed"
                instance: "/api/v1/analyses"
        '502':
          description: AI provider upstream failure
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              example:
                type: "urn:problem-type:ai-provider-failure"
                title: "Bad Gateway"
                status: 502
                detail: "AI provider is not responding"
                instance: "/api/v1/analyses"
        '503':
          description: Service unavailable — circuit breaker open or backend unreachable
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              example:
                type: "urn:problem-type:circuit-breaker-open"
                title: "Service Unavailable"
                status: 503
                detail: "Circuit breaker is open — service temporarily unavailable"
                instance: "/api/v1/analyses"

  /api/v1/analyses/history:
    get:
      operationId: queryAuditLogHistory
      summary: Query paginated audit log history
      description: >
        Returns a paginated list of resolved (REMEDIATED/DISMISSED) AI analyses
        sorted by resolvedAt descending. Supports pagination via page and size parameters.
        Size is silently capped at 100.
      parameters:
        - name: page
          in: query
          required: false
          description: Zero-indexed page number
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          description: Items per page (silently capped at 100)
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Successful query — paginated audit log history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogHistoryResponse'
        '400':
          description: Validation error — invalid page or size parameter
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              example:
                type: "urn:problem-type:validation-error"
                title: "Validation Error"
                status: 400
                detail: "page must be >= 0 and size must be >= 1. Got page=-1, size=0"

components:
  schemas:
    AiAnalysisResponse:
      type: object
      description: AI analysis report for a Kubernetes pod
      required:
        - podName
        - namespace
        - verdict
        - rootCauseAnalysis
        - recommendedActions
        - analyzedAt
      properties:
        podName:
          type: string
          description: Name of the analyzed Kubernetes pod
          example: nginx-deployment-abc123
        namespace:
          type: string
          description: Kubernetes namespace of the analyzed pod
          example: production
        verdict:
          type: string
          description: AI-determined health verdict for the pod
          enum:
            - HEALTHY
            - TRANSIENT_ISSUE
            - CRITICAL_FAILURE
          example: CRITICAL_FAILURE
        rootCauseAnalysis:
          type: string
          description: AI-generated explanation of the root cause
          example: "Pod terminated due to OOMKilled — memory limit exceeded"
        recommendedActions:
          type: array
          description: List of AI-recommended remediation actions
          items:
            type: string
          example:
            - "Increase memory limits in deployment spec"
            - "Review application memory usage patterns"
        analyzedAt:
          type: string
          format: date-time
          description: ISO-8601 timestamp of when the analysis was performed
          example: "2024-01-15T10:30:00Z"
        modelUsed:
          type: string
          description: LLM model identifier that produced this analysis
          example: "llama3.1:8b"

    ProblemDetail:
      type: object
      description: >
        RFC 7807 Problem Details for HTTP APIs.
        Provides machine-readable error information for API consumers.
      properties:
        type:
          type: string
          format: uri
          description: A URI reference that identifies the problem type
          example: "urn:problem-type:circuit-breaker-open"
        title:
          type: string
          description: A short human-readable summary of the problem type
          example: "Service Unavailable"
        status:
          type: integer
          format: int32
          description: The HTTP status code
          example: 503
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence
          example: "Circuit breaker is open — service temporarily unavailable"
        instance:
          type: string
          format: uri
          description: A URI reference that identifies the specific occurrence
          example: "/api/v1/analyses"

    HistoryResponseDto:
      type: object
      description: Single entry in the audit log history
      required:
        - resolvedAt
        - podName
        - namespace
        - verdict
        - status
        - rootCauseAnalysis
        - recommendedActions
        - modelUsed
      properties:
        resolvedAt:
          type: string
          format: date-time
          description: ISO-8601 timestamp of resolution
          example: "2025-07-06T12:30:00Z"
        podName:
          type: string
          description: Kubernetes pod name
          example: golden-path-app-5f548d69d9-kjwwg
        namespace:
          type: string
          description: Kubernetes namespace
          example: chaos-validation
        verdict:
          type: string
          description: AI verdict
          example: CRITICAL_FAILURE
        status:
          type: string
          enum:
            - REMEDIATED
            - DISMISSED
          description: Resolution status
          example: REMEDIATED
        rootCauseAnalysis:
          type: string
          description: AI root cause analysis
          example: "CrashLoopBackOff due to missing env var DB_URL"
        recommendedActions:
          type: array
          items:
            type: string
          description: Recommended remediation actions
          example:
            - "kubectl set env deployment/golden-path-app DB_URL=..."
        modelUsed:
          type: string
          description: LLM model that produced the diagnosis
          example: "llama3.1:8b"

    AuditLogHistoryResponse:
      type: object
      description: Paginated audit log history response
      required:
        - content
        - page
        - size
        - totalElements
        - totalPages
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/HistoryResponseDto'
        page:
          type: integer
          description: Current page number (zero-indexed)
          example: 0
        size:
          type: integer
          description: Effective page size
          example: 20
        totalElements:
          type: integer
          format: int64
          description: Total number of resolved analyses
          example: 47
        totalPages:
          type: integer
          description: Total number of pages
          example: 3
