# ──────────────────────────────────────────────────────────────────────────────
# Global Platform Orchestration — Phase 14 / Milestone 31
#
# Unified Docker Compose manifest integrating all platform services.
# Includes: Kafka (KRaft), AI Analyzer (Spring Boot), Observability UI (Nginx)
#
# Usage:
#   docker compose -f deployments/docker-compose.yaml up -d
#   docker compose -f deployments/docker-compose.yaml down -v
# ──────────────────────────────────────────────────────────────────────────────

include:
  - path: docker-compose/docker-compose.yml

services:
  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: opensearch
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - platform-net
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 512M
    security_opt:
      - no-new-privileges:true

  k8s-collector:
    build:
      context: ../
      dockerfile: services/k8s-collector/Dockerfile
    container_name: k8s-collector
    ports:
      - "8081:8081"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${HOME}/.kube:/home/appuser/.kube:ro
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - platform-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    security_opt:
      - no-new-privileges:true

  mcp-server:
    build:
      context: ../services/mcp-server
      dockerfile: Dockerfile
    container_name: mcp-server
    environment:
      MCP_MODE: "live"
      MCP_PORT: "${MCP_PORT:-3001}"
      MCP_ALLOWED_NAMESPACES: "${MCP_ALLOWED_NAMESPACES:-default,chaos-validation}"
      MCP_IDEMPOTENCY_TTL_SECONDS: "${MCP_IDEMPOTENCY_TTL_SECONDS:-300}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${HOME}/.kube:/home/node/.kube:ro
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - platform-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    user: "1000:1000"

  ai-analyzer:
    build:
      context: ../
      dockerfile: services/ai-analyzer/Dockerfile
    container_name: ai-analyzer
    ports:
      - "8082:8082"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      PLATFORM_MCP_SERVER_URL: "http://mcp-server:3001"
      PLATFORM_AI_PROVIDER: "${PLATFORM_AI_PROVIDER:-ollama}"
      OLLAMA_API_URL: "http://host.docker.internal:11434"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.1}"
      OPENSEARCH_URIS: "http://opensearch:9200"
      OPENSEARCH_USERNAME: "${OPENSEARCH_USERNAME:-admin}"
      OPENSEARCH_PASSWORD: "${OPENSEARCH_PASSWORD:-admin}"
      BYOK_ENDPOINT: "${BYOK_ENDPOINT:-}"
      BYOK_API_KEY: "${BYOK_API_KEY:-}"
      BYOK_MODEL: "${BYOK_MODEL:-}"
      BYOK_PROVIDER_TYPE: "${BYOK_PROVIDER_TYPE:-OPENAI_COMPATIBLE}"
    depends_on:
      kafka:
        condition: service_healthy
      mcp-server:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - platform-net
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M
    read_only: true
    tmpfs:
      - /tmp
      - /app/logs
    security_opt:
      - no-new-privileges:true
    user: "1000:1000"

  observability-ui:
    build:
      context: ../ui
      dockerfile: Dockerfile
    container_name: observability-ui
    ports:
      - "3000:80"
    depends_on:
      ai-analyzer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/healthz || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - platform-net
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    read_only: true
    tmpfs:
      - /var/cache/nginx:uid=101,gid=101
      - /var/run:uid=101,gid=101
      - /var/log/nginx:uid=101,gid=101
      - /run:uid=101,gid=101
      - /tmp:uid=101,gid=101
    security_opt:
      - no-new-privileges:true

networks:
  platform-net:
    driver: bridge

volumes:
  opensearch-data:
    driver: local
