# ──────────────────────────────────────────────────────────────────────────────
# Local Kafka Infrastructure — Phase 2 / Milestone 4
#
# Mode:    KRaft (no Zookeeper)
# Image:   confluentinc/cp-kafka:7.6.1
# Topic:   k8s-pod-events  (3 partitions, replication-factor 1)
#
# Usage:
#   docker compose up -d
#   docker compose down -v   # removes volumes
# ──────────────────────────────────────────────────────────────────────────────

services:

  kafka:
    image: confluentinc/cp-kafka:7.6.1@sha256:620734d9fc0bb1f9886932e5baf33806074469f40e3fe246a3fdbb59309535fa
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"       # external access from host (Spring Boot app)
      - "9093:9093"       # KRaft controller listener (internal)
    environment:
      # ── KRaft identity ──────────────────────────────────────────────────────
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"

      # ── Listeners ───────────────────────────────────────────────────────────
      # PLAINTEXT      → used by internal Docker services
      # PLAINTEXT_HOST → used by the Spring Boot app running on the host
      KAFKA_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # ── Topic defaults ───────────────────────────────────────────────────────
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_NUM_PARTITIONS: 3

      # ── Auto-create topic on startup ─────────────────────────────────────────
      # The init container below handles explicit topic creation with the exact
      # partition count required by the contract.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

      # ── KRaft cluster ID (must be a valid base64 UUID) ───────────────────────
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"

      # ── Log retention (lightweight for local dev) ────────────────────────────
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 104857600      # 100 MB

    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - platform-net
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 256M

  # ── Topic initialiser ────────────────────────────────────────────────────────
  # Runs once after Kafka is healthy and creates the k8s-pod-events topic
  # with exactly 3 partitions as required by the contract in system.spec.md.
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1@sha256:620734d9fc0bb1f9886932e5baf33806074469f40e3fe246a3fdbb59309535fa
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Creating topic k8s-pod-events..."
        kafka-topics --bootstrap-server kafka:29092 \
          --create \
          --if-not-exists \
          --topic k8s-pod-events \
          --partitions 3 \
          --replication-factor 1
        echo "Creating topic ai-analysis-events..."
        kafka-topics --bootstrap-server kafka:29092 \
          --create \
          --if-not-exists \
          --topic ai-analysis-events \
          --partitions 3 \
          --replication-factor 1
        echo "Topics created successfully."
    restart: "no"
    networks:
      - platform-net
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

volumes:
  kafka-data:
    driver: local

networks:
  platform-net:
    driver: bridge
